<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora Group</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
color:white;
}

.chat{
display:flex;
flex-direction:column;
height:100vh;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
display:flex;
gap:10px;
margin-bottom:15px;
align-items:flex-start;
}

.msg img{
width:40px;
height:40px;
border-radius:50%;
}

.msg b{
font-size:14px;
cursor:pointer;
}

.msg p{
margin:2px 0;
font-size:14px;
color:#ccc;
}

.input{
display:flex;
padding:10px;
background:#111;
}

.input input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#222;
color:white;
}

.input button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:white;
color:black;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat">

<div class="messages" id="messages"></div>

<div class="input">
<input id="text" placeholder="Type message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const supabase = window.supabase.createClient(
"https://lwnheytfhwgryxikjjwu.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3bmhleXRmaHdncnl4aWtqand1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MDcxNjEsImV4cCI6MjA5MzI4MzE2MX0.qTJGYWouA9w9RZU8WFkE7ZbK-J3O1Snvwi9CbEMNxtQ"
)

const name = localStorage.getItem("name") || "User"
const avatar = localStorage.getItem("avatar") || "https://i.imgur.com/6VBx3io.png"

async function send(){
let text = document.getElementById("text").value

if(!text) return

await supabase.from("messages").insert([
{
name:name,
avatar:avatar,
message:text
}
])

document.getElementById("text").value = ""
}

async function load(){
let { data } = await supabase
.from("messages")
.select("*")
.order("created_at",{ascending:true})

let box = document.getElementById("messages")
box.innerHTML=""

data.forEach(m=>{
box.innerHTML += `
<div class="msg">
<img src="${m.avatar}">
<div>
<b onclick="openProfile('${m.name}')">${m.name}</b>
<p>${m.message}</p>
</div>
</div>
`
})

box.scrollTop = box.scrollHeight
}

setInterval(load,1000)

function openProfile(name){
alert("Open profile: " + name)
}

</script>

</body>
</html>
