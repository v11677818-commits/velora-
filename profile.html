<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
}

/* header */
.header{
display:flex;
justify-content:space-between;
padding:15px;
font-size:18px;
}

.arrow{
cursor:pointer;
}

/* profile image */
.profile{
text-align:center;
margin-top:20px;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:url('https://i.imgur.com/2DhmtJ4.jpg');
background-size:cover;
margin:auto;
position:relative;
}

.camera{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#000;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.change{
color:#00cfff;
margin-top:10px;
cursor:pointer;
}

/* cards */
.card{
background:#1a1a1a;
margin:15px;
padding:15px;
border-radius:15px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1a1a1a;
margin:15px;
border-radius:15px;
}

.left{
color:#888;
}

.right{
font-size:16px;
}
</style>
</head>

<body>

<!-- header -->
<div class="header">
<div class="arrow" onclick="back()">‹</div>
<div>Edit Profile</div>
<div></div>
</div>

<!-- image -->
<div class="profile">
<div class="avatar">
<div class="camera">📷</div>
</div>
<div class="change">Change Photo</div>
</div>

<!-- info card -->
<div class="card">

<div class="row">
<div>Name</div>
<div>Any Name (Just a Template)</div>
</div>

<div class="row">
<div>Username</div>
<div>Any Name (Just a Template)</div>
</div>

<div class="row">
<div>Points</div>
<div>(...)</div>
</div>

</div>

<!-- bio -->
<div class="item">
<div class="right">Bio</div>
<div class="left">Write something about yourself</div>
</div>

<!-- stats -->
<div class="item">
<div class="right">Number of Challenges</div>
<div class="left">(....)</div>
</div>

<div class="item">
<div class="right">Earnings</div>
<div class="left">(....)</div>
</div>

<div class="item">
<div class="right">Level</div>
<div class="left">(....)</div>
</div>

<script>
function back(){
window.history.back();
}
</script>

</body>
</html>
