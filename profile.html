<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
text-align:center;
}

/* header */
.header{
display:flex;
align-items:center;
padding:15px;
}

/* profile */
.profile{
margin-top:30px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

input{
margin-top:10px;
padding:10px;
border:none;
border-radius:20px;
}

/* stats */
.stats{
margin-top:20px;
}

.box{
background:#1a1a1a;
margin:10px;
padding:15px;
border-radius:15px;
}

/* button */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#f3b6d2;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div onclick="back()" style="cursor:pointer">←</div>
</div>

<h2>Profile</h2>

<div class="profile">

<img id="avatar" src="https://i.imgur.com/6X12K0G.png">

<br>

<input type="file" onchange="changeImage(event)">

<br>

<input id="name" placeholder="Your name">

</div>

<div class="stats">

<div class="box">
Points: <span id="points">0</span>
</div>

<div class="box">
Level: <span id="level">1</span>
</div>

</div>

<button onclick="save()">Save</button>

<p id="status"></p>

<script>

function back(){
window.location.href="chat.html";
}

function changeImage(e){
let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(){
document.getElementById("avatar").src = reader.result;
}

reader.readAsDataURL(file);
}

/* fake save */
function save(){
document.getElementById("status").innerText = "Saved";
}

/* level system */
let points = 0;

function addPoints(p){
points += p;
document.getElementById("points").innerText = points;

let lvl = Math.floor(points / 100) + 1;
document.getElementById("level").innerText = lvl;
}

</script>

</body>
</html>
