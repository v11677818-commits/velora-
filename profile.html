<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
margin:0;
background:#000;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
color:#fff;
}

/* header */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
font-size:20px;
}

.header span{
cursor:pointer;
}

/* profile image */
.profile{
text-align:center;
margin-top:10px;
}

.avatar{
width:130px;
height:130px;
border-radius:50%;
background:url('https://i.imgur.com/2DhmtJ4.jpg') center/cover;
margin:auto;
position:relative;
}

.camera{
position:absolute;
bottom:-5px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#000;
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.change{
color:#1da1ff;
margin-top:12px;
font-size:16px;
}

/* glass cards */
.card{
margin:15px;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
}

.row{
display:flex;
justify-content:space-between;
padding:15px 5px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.row:last-child{
border-bottom:none;
}

.title{
opacity:0.7;
}

.arrow{
opacity:0.5;
}

/* sections */
.section{
margin:15px;
padding:15px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
justify-content:space-between;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:40px;
height:40px;
border-radius:10px;
background:rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

.text small{
display:block;
opacity:0.5;
font-size:13px;
}

</style>
</head>

<body>

<!-- header -->
<div class="header">
<span onclick="back()">‹</span>
<div>Profile</div>
<span>›</span>
</div>

<!-- profile -->
<div class="profile">
<div class="avatar">
<div class="camera">📷</div>
</div>
<div class="change">Change Photo</div>
</div>

<!-- info -->
<div class="card">

<div class="row">
<div class="title">Name</div>
<div>Any Name (Just a Template) <span class="arrow">›</span></div>
</div>

<div class="row">
<div class="title">Username</div>
<div>Any Name (Just a Template) <span class="arrow">›</span></div>
</div>

<div class="row">
<div class="title">Points</div>
<div>(...) <span class="arrow">›</span></div>
</div>

</div>

<!-- bio -->
<div class="section">
<div class="left">
<div class="icon">👤</div>
<div class="text">
<div>Bio</div>
<small>Write something about yourself</small>
</div>
</div>
<span class="arrow">›</span>
</div>

<!-- challenges -->
<div class="section">
<div class="left">
<div class="icon">🏆</div>
<div class="text">
<div>Number of Challenges</div>
<small>(....)</small>
</div>
</div>
<span class="arrow">›</span>
</div>

<!-- earnings -->
<div class="section">
<div class="left">
<div class="icon">💳</div>
<div class="text">
<div>Earnings</div>
<small>(....)</small>
</div>
</div>
<span class="arrow">›</span>
</div>

<!-- level -->
<div class="section">
<div class="left">
<div class="icon">📊</div>
<div class="text">
<div>Level</div>
<small>(....)</small>
</div>
</div>
<span class="arrow">›</span>
</div>

<script>
function back(){
window.history.back();
}
</script>

</body>
</html>
