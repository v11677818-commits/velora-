<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Chat</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
height:100vh;
display:flex;
flex-direction:column;
}

/* header */
.top{
display:flex;
justify-content:flex-end;
align-items:center;
padding:15px;
gap:10px;
}

.sub-btn{
background:#1a1a1a;
border:none;
color:#fff;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

.menu{
width:40px;
height:40px;
background:#1a1a1a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* center text */
.center{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#ccc;
}

/* bottom bar */
.bottom{
padding:10px;
background:#000;
}

.input-box{
display:flex;
align-items:center;
background:#1a1a1a;
border-radius:25px;
padding:8px 10px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
padding:10px;
}

.icon{
width:35px;
height:35px;
background:#2a2a2a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:5px;
cursor:pointer;
}

.plus{
margin-left:5px;
}
</style>
</head>

<body>

<!-- top -->
<div class="top">
<button class="sub-btn" onclick="goSub()">Subscribe</button>
<div class="menu" onclick="openMenu()">≡</div>
</div>

<!-- center -->
<div class="center">
How can I help you?
</div>

<!-- bottom -->
<div class="bottom">
<div class="input-box">

<div class="icon">🎤</div>

<input type="text" placeholder="Ask Velora">

<div class="icon plus" onclick="send()">+</div>

</div>
</div>

<script>

function goSub(){
window.location.href="subscription.html";
}

function openMenu(){
alert("menu");
}

/* fake send */
function send(){
alert("message sent");
}

</script>

</body>
</html>
