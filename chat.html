<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Chat</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

/* Body */
body{
background:#000;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

/* Top bar */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.subscribe-btn{
background:#1c1c1c;
padding:8px 18px;
border-radius:20px;
font-size:14px;
}

/* Center text */
.center-text{
flex:1;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
opacity:0.8;
}

/* Bottom input */
.bottom-bar{
padding:12px;
}

.input-box{
background:#1a1a1a;
border-radius:30px;
display:flex;
align-items:center;
padding:8px 12px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
font-size:14px;
}

.icon{
margin:0 6px;
cursor:pointer;
opacity:0.8;
}

/* Sidebar */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0f0f0f;
padding:20px;
transition:0.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
margin:18px 0;
font-size:15px;
}

/* Overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:900;
}

.overlay.active{
display:block;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

<a href="chat.html">Bot</a>
<a href="group.html">Group</a>
<a href="game.html">Velora Game</a>
<a href="outfits.html">Outfits</a>
<a href="challenges.html">Challenges</a>
<a href="store.html">Store</a>
<a href="subscription.html">Subscription</a>
<a href="profile.html">Profile</a>
<a href="create-group.html">Create Group</a>

</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- Top -->
<div class="top-bar">
<div class="menu-btn" onclick="openMenu()">≡</div>
<div class="subscribe-btn">Subscription</div>
</div>

<!-- Center -->
<div class="center-text">
How can I help you?
</div>

<!-- Bottom -->
<div class="bottom-bar">
<div class="input-box">
<span class="icon">🎤</span>
<input type="text" placeholder="Ask Velora...">
<span class="icon">＋</span>
</div>
</div>

<script>

/* Menu */
function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
