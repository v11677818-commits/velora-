<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velora Chat</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
height:100vh;
overflow:hidden;
}

/* sidebar */
.sidebar{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#0f0f0f;
padding:20px;
transition:0.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
margin:15px 0;
font-size:16px;
}

/* overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
z-index:900;
}

.overlay.active{
display:block;
}

/* header */
.top{
display:flex;
justify-content:flex-end;
align-items:center;
padding:15px;
gap:10px;
}

.sub-btn{
background:#1a1a1a;
border:none;
color:#fff;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

.menu{
width:40px;
height:40px;
background:#1a1a1a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* center */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#aaa;
}

/* bottom */
.bottom{
position:absolute;
bottom:0;
width:100%;
padding:10px;
}

.input-box{
display:flex;
align-items:center;
background:#1a1a1a;
border-radius:25px;
padding:8px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
outline:none;
color:#fff;
padding:10px;
}

.icon{
width:35px;
height:35px;
background:#2a2a2a;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin-right:5px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- sidebar -->
<div class="sidebar" id="sidebar">
<a href="chat.html">Bot</a>
<a href="group.html">Group</a>
<a href="game.html">Velora Game</a>
<a href="outfits.html">Outfits</a>
<a href="challenges.html">Challenges</a>
<a href="store.html">Store</a>
<a href="subscription.html">Subscription</a>
<a href="profile.html">Profile</a>
<a href="create-group.html">Create Group</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- header -->
<div class="top">
<button class="sub-btn" onclick="goSub()">Subscribe</button>
<div class="menu" onclick="openMenu()">≡</div>
</div>

<!-- center -->
<div class="center">
How can I help you?
</div>

<!-- bottom -->
<div class="bottom">
<div class="input-box">
<div class="icon">🎤</div>
<input type="text" placeholder="Ask Velora">
<div class="icon" onclick="send()">+</div>
</div>
</div>

<script>

function goSub(){
window.location.href="subscription.html";
}

function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

function send(){
alert("message sent");
}

</script>

</body>
</html>
